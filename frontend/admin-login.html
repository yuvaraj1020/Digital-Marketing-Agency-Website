<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host Secure Login — BhAAi Fans Digital AA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/responsive.css" />
  <style>
    .auth-container {
      max-width: 450px;
      margin: 10rem auto 5rem;
      padding: 3rem;
      background: #111;
      border-radius: 4px;
      border: 1px solid var(--accent);
      box-shadow: 0 0 20px rgba(200, 255, 0, 0.1);
    }
    .auth-container h1 { text-align: center; margin-bottom: 2rem; color: var(--accent); }
    .auth-form .form-group { margin-bottom: 1.5rem; }
    .auth-form label { display: block; margin-bottom: 0.5rem; font-family: var(--font-mono); font-size: 0.8rem; color: var(--gray-3); text-transform: uppercase; }
    .auth-form input { width: 100%; padding: 1rem; border: 1px solid var(--gray-2); background: transparent; color: var(--text-light); border-radius: 4px; font-family: var(--font-body); outline: none; transition: border-color 0.3s ease; }
    .auth-form input:focus { border-color: var(--accent); }
    .auth-btn { width: 100%; margin-top: 1rem; text-align: center; }
    #auth-error { color: #ff4444; margin-bottom: 1rem; font-size: 0.9rem; text-align: center; display: none; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">BhAAi Fans<span>.</span></a>
  </nav>

  <div class="auth-container">
    <h1>HOST PORTAL</h1>
    <div id="auth-error"></div>
    <form id="login-form" class="auth-form">
      <div class="form-group">
        <label for="email">Admin Email</label>
        <input type="email" id="email" name="email" required placeholder="admin@bhaai.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••" />
      </div>
      <button type="submit" class="btn-primary auth-btn">Access Backend</button>
    </form>
  </div>

  <script src="/static/js/main.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('auth-error');
      
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (res.ok && data.success) {
          window.location.href = data.redirect || '/admin/dashboard';
        } else {
          errorDiv.textContent = data.error || 'Authentication Failed';
          errorDiv.style.display = 'block';
        }
      } catch (err) {
        errorDiv.textContent = 'Network offline';
        errorDiv.style.display = 'block';
      }
    });
  </script>
  <script>
    // Authentication Check and Dynamic Navbar Update
    fetch('/auth/me')
      .then(res => res.json())
      .then(data => {
        const btn = document.getElementById('nav-login-btn');
        if (data.authenticated) {
          if (btn) {
            btn.textContent = 'Logout';
            btn.href = (data.type === 'admin') ? '/auth/logout' : '/auth/user/logout';
          }
        }
      });
  </script>
</body>
</html>
