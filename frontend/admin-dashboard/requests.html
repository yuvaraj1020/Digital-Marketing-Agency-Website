<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Requests — BhAAi Fans Digital AA Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root{--black:#0a0a0a;--white:#f5f0e8;--accent:#c8ff00;--gray-1:#1a1a1a;--gray-2:#2a2a2a;--gray-3:#444;--gray-4:#888;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;display:flex;min-height:100vh;}
    .sidebar{width:220px;background:var(--gray-1);border-right:1px solid rgba(245,240,232,0.08);padding:2rem 1.5rem;display:flex;flex-direction:column;gap:0.4rem;flex-shrink:0;}
    .sidebar-logo{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--white);margin-bottom:2rem;}
    .sidebar-logo span{color:var(--accent);}
    .sidebar a{display:flex;align-items:center;gap:0.7rem;padding:0.7rem 0.9rem;color:var(--gray-4);text-decoration:none;font-family:'DM Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;border-radius:4px;transition:all 0.2s;}
    .sidebar a:hover,.sidebar a.active{color:var(--white);background:var(--gray-2);}
    .sidebar a.active{border-left:2px solid var(--accent);color:var(--accent);}
    .main{flex:1;padding:2.5rem;overflow-y:auto;}
    .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2.5rem;}
    .top-bar h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.04em;}
    .card{background:var(--gray-1);border:1px solid rgba(245,240,232,0.06);border-radius:4px;padding:1.5rem;}
    table{width:100%;border-collapse:collapse;}
    th{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray-4);text-align:left;padding:0.6rem 0.8rem;border-bottom:1px solid rgba(245,240,232,0.06);}
    td{padding:0.75rem 0.8rem;border-bottom:1px solid rgba(245,240,232,0.04);font-size:0.85rem;color:var(--white);}
    tr:last-child td{border-bottom:none;}
    .badge{display:inline-block;font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.25rem 0.6rem;border-radius:3px;}
    .badge-new{background:rgba(200,255,0,0.12);color:var(--accent);}
    .badge-progress{background:rgba(59,130,246,0.15);color:#93c5fd;}
    .badge-done{background:rgba(74,222,128,0.12);color:#4ade80;}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">BhAAi<span>.</span></div>
    <a href="dashboard.html">Dashboard</a>
    <a href="clients.html">Clients</a>
    <a href="requests.html" class="active">Requests</a>
    <a href="/" target="_blank">View Site</a>
  </aside>
  <main class="main">
    <div class="top-bar"><h1>Service Requests</h1></div>
    <div class="card">
      <table>
        <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Service</th><th>Status</th><th>Date</th><th>Action</th></tr></thead>
        <tbody id="requests-table">
          <tr><td colspan="6" style="color:var(--gray-4);text-align:center;padding:3rem;">Connect backend to load requests</td></tr>
        </tbody>
      </table>
    </div>
  </main>
  <script>
    function loadLeads() {
      fetch('/api/leads').then(r=>r.json()).then(data=>{
        const tbody=document.getElementById('requests-table');
        const leads = data.leads || [];
        if(!leads.length){tbody.innerHTML='<tr><td colspan="7" style="color:var(--gray-4);text-align:center;padding:3rem;">No requests yet</td></tr>';return;}
        tbody.innerHTML=leads.map((r,i)=>`<tr><td style="color:var(--gray-4);">${i+1}</td><td>${r.name}</td><td style="color:var(--gray-4);">${r.email}</td><td>${r.service_interested}</td><td><span class="badge badge-${r.status==='New'?'new':'progress'}">${r.status}</span></td><td style="color:var(--gray-4);">${r.created_at?.split(' ')[0]||'—'}</td><td><button onclick="deleteLead(${r.id})" style="background:transparent;border:none;color:#ff5050;cursor:pointer;font-family:var(--font-mono);text-transform:uppercase;font-size:0.6rem;">Delete</button></td></tr>`).join('');
      }).catch(()=>{});
    }
    
    function deleteLead(id) {
      if(!confirm('Are you sure you want to delete this lead?')) return;
      fetch('/api/leads/' + id, {method: 'DELETE'})
        .then(r=>r.json())
        .then(res => {
          if(res.success) loadLeads();
          else alert(res.error || 'Failed to delete');
        });
    }
    
    loadLeads();
  </script>
</body>
</html>
