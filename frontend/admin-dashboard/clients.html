<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clients — BhAAi Fans Digital AA Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root{--black:#0a0a0a;--white:#f5f0e8;--accent:#c8ff00;--gray-1:#1a1a1a;--gray-2:#2a2a2a;--gray-3:#444;--gray-4:#888;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;display:flex;min-height:100vh;cursor:none;}
    .cursor{width:10px;height:10px;background:var(--accent);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform 0.1s;}
    .cursor-follower{width:36px;height:36px;border:1px solid rgba(200,255,0,0.4);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform 0.15s ease,opacity 0.2s;}
    body:hover .cursor, body:hover .cursor-follower { opacity: 1; }
    .sidebar{width:220px;background:var(--gray-1);border-right:1px solid rgba(245,240,232,0.08);padding:2rem 1.5rem;display:flex;flex-direction:column;gap:0.4rem;flex-shrink:0;}
    .sidebar-logo{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--white);margin-bottom:2rem;}
    .sidebar-logo span{color:var(--accent);}
    .sidebar a{display:flex;align-items:center;gap:0.7rem;padding:0.7rem 0.9rem;color:var(--gray-4);text-decoration:none;font-family:'DM Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;border-radius:4px;transition:all 0.2s;}
    .sidebar a:hover,.sidebar a.active{color:var(--white);background:var(--gray-2);}
    .sidebar a.active{border-left:2px solid var(--accent);color:var(--accent);}
    .main{flex:1;padding:2.5rem;overflow-y:auto;}
    .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2.5rem;}
    .top-bar h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.04em;}
    .search-bar{background:var(--gray-1);border:1px solid rgba(245,240,232,0.08);color:var(--white);font-family:'DM Mono',monospace;font-size:0.75rem;letter-spacing:0.05em;padding:0.6rem 1rem;width:260px;outline:none;}
    .search-bar:focus{border-color:rgba(200,255,0,0.3);}
    .card{background:var(--gray-1);border:1px solid rgba(245,240,232,0.06);border-radius:4px;padding:1.5rem;}
    table{width:100%;border-collapse:collapse;}
    th{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray-4);text-align:left;padding:0.6rem 0.8rem;border-bottom:1px solid rgba(245,240,232,0.06);}
    td{padding:0.75rem 0.8rem;border-bottom:1px solid rgba(245,240,232,0.04);font-size:0.85rem;color:var(--white);}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(245,240,232,0.02);}
    .badge{display:inline-block;font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.25rem 0.6rem;border-radius:3px;background:rgba(200,255,0,0.12);color:var(--accent);}
  </style>
</head>
<body>
  <div class="cursor"></div>
  <div class="cursor-follower"></div>
  <aside class="sidebar">
    <div class="sidebar-logo">BhAAi<span>.</span></div>
    <a href="dashboard.html">Dashboard</a>
    <a href="clients.html" class="active">Clients</a>
    <a href="requests.html">Requests</a>
    <a href="/" target="_blank">View Site</a>
  </aside>
  <main class="main">
    <div class="top-bar">
      <h1>Clients</h1>
      <input type="text" class="search-bar" placeholder="Search clients..." id="search" />
    </div>
    <div class="card">
      <table>
        <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Company</th><th>Service</th><th>Date</th></tr></thead>
        <tbody id="clients-table">
          <tr><td colspan="6" style="color:var(--gray-4);text-align:center;padding:3rem;">Connect backend to load clients</td></tr>
        </tbody>
      </table>
    </div>
  </main>
  <script>
    fetch('/api/leads').then(r=>{
        if(r.status === 401) window.location.href = '/admin-login.html';
        return r.json();
    }).then(data=>{
      const tbody=document.getElementById('clients-table');
      const leads = data.leads || [];
      if(!leads.length){tbody.innerHTML='<tr><td colspan="6" style="color:var(--gray-4);text-align:center;padding:3rem;">No clients yet</td></tr>';return;}
      tbody.innerHTML=leads.map((c,i)=>`<tr><td style="color:var(--gray-4);">${i+1}</td><td>${c.name}</td><td style="color:var(--gray-4);">${c.email}</td><td>${c.company||'—'}</td><td><span class="badge">${c.service_interested||'—'}</span></td><td style="color:var(--gray-4);">${c.created_at?.split(' ')[0]||'—'}</td></tr>`).join('');
      document.getElementById('search').addEventListener('input',e=>{
        const q=e.target.value.toLowerCase();
        tbody.querySelectorAll('tr').forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(q)?'':'none';});
      });
    }).catch(()=>{});
  </script>
  <script>
    const cursor=document.querySelector('.cursor'),follower=document.querySelector('.cursor-follower');
    if(cursor&&follower){
      let mx=0,my=0,fx=0,fy=0;
      document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
      const anim=()=>{fx+=(mx-fx)*0.12;fy+=(my-fy)*0.12;follower.style.left=fx+'px';follower.style.top=fy+'px';requestAnimationFrame(anim);};
      anim();
      document.querySelectorAll('a, button, input').forEach(el=>{
        el.addEventListener('mouseenter',()=>{cursor.style.transform='translate(-50%,-50%) scale(2.5)';follower.style.opacity='0.5';});
        el.addEventListener('mouseleave',()=>{cursor.style.transform='translate(-50%,-50%) scale(1)';follower.style.opacity='1';});
      });
    }
  </script>
</body>
</html>
